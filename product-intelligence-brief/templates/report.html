<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社交产品雷达日报 — {date}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f7f4f0;
    color: #2d2a26;
    line-height: 1.7;
    padding: 40px 24px;
  }
  .container { max-width: 680px; margin: 0 auto; }
  .header {
    background: #fff;
    border: 1px solid #e8e2d8;
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1714;
    margin-bottom: 8px;
  }
  .header .date {
    font-size: 13px;
    color: #8c8273;
    margin-bottom: 16px;
  }
  .summary {
    background: #faf7f2;
    border-left: 3px solid #ff6b35;
    padding: 14px 18px;
    border-radius: 0 8px 8px 0;
    font-size: 15px;
    color: #4a4038;
  }
  .summary .label {
    font-weight: 700;
    color: #ff6b35;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .card {
    background: #fff;
    border: 1px solid #e8e2d8;
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .card-num {
    font-size: 12px;
    font-weight: 700;
    color: #ff6b35;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .card h3 {
    font-size: 18px;
    font-weight: 700;
    color: #1a1714;
    margin-bottom: 20px;
  }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    font-size: 13px;
    font-weight: 700;
    color: #8c8273;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .field-body {
    font-size: 15px;
    color: #3d3832;
  }
  .field-body a {
    color: #ff6b35;
    text-decoration: none;
    border-bottom: 1px solid #ffd4c0;
    transition: border-color 0.2s;
  }
  .field-body a:hover { border-color: #ff6b35; }
  .time-marker {
    font-size: 12px;
    color: #b8ae9e;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #f0ebe0;
  }
  .freshness-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 6px;
  }
  .badge-green { background: #e8f5e9; color: #2e7d32; }
  .badge-yellow { background: #fff8e1; color: #f57f17; }
  .badge-orange { background: #fff3e0; color: #e65100; }
  .badge-blue { background: #e3f2fd; color: #1565c0; }
  .highlight {
    background: #fff;
    border: 2px solid #ff6b35;
    border-radius: 12px;
    padding: 28px;
    margin-top: 24px;
  }
  .highlight .label {
    font-size: 13px;
    font-weight: 700;
    color: #ff6b35;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .highlight p {
    font-size: 15px;
    color: #3d3832;
  }
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: #b8ae9e;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📋 社交产品雷达日报</h1>
    <div class="date">{date}</div>
    <div class="summary">
      <div class="label">晨报摘要</div>
      {summary}
    </div>
  </div>

  {cards}

  <div class="highlight">
    <div class="label">🎯 今日最值得关注</div>
    <p>{highlight}</p>
  </div>

  <div class="footer">Hermes Agent · 社交产品雷达 · 自动生成</div>

</div>
</body>
</html>
